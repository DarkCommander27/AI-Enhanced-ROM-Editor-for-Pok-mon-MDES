name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          $iconArgs = @()
          if (Test-Path "assets/app.ico") {
            $iconArgs = @("--icon", "assets/app.ico")
          }

          python -m PyInstaller --noconfirm --clean --onefile --windowed --name MDES-ROM-Editor --version-file scripts/windows_version_info.txt @iconArgs main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MDES-ROM-Editor-windows
          path: dist/MDES-ROM-Editor.exe
